services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Siran@123
      MYSQL_DATABASE: AiAgentDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./AiAgentBackend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Server=mysql;Database=AiAgentDb;User=root;Password=Siran@123;
    volumes:
      - ./AiAgentBackend/logs:/app/logs
    restart: unless-stopped
    depends_on:
      - mysql

volumes:
  mysql_data: