services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Siran@123
      MYSQL_DATABASE: AiAgentDb
      MYSQL_USER: aiagent
      MYSQL_PASSWORD: AiAgent@123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aiagent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSiran@123"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aiagent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - aiagent-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./AiAgentBackend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"  # HTTP only - remove HTTPS for production
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000  # HTTP only
      ConnectionStrings__DefaultConnection: Server=mysql;Database=AiAgentDb;User=aiagent;Password=AiAgent@123;
      Redis__ConnectionString: redis:6379
      WhatsApp__BotApiUrl: http://whatsapp-bot:3001
      Kestrel__Endpoints__Http__Url: http://+:5000  # Force HTTP
    volumes:
      - ./AiAgentBackend/logs:/app/logs
      - ./ssl-certs:/app/ssl-certs:ro  # For future SSL certs
    networks:
      - aiagent-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  whatsapp-bot:
    build:
      context: ./WhatsAppBot
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_auth:/app/auth_info
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:5000
      WHATSAPP_PORT: 3001
      BACKEND_RETRY_ATTEMPTS: 10
      BACKEND_RETRY_DELAY: 5000
    networks:
      - aiagent-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Add nginx for SSL termination in production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"  # For future SSL
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl-certs:/etc/ssl/certs:ro
    networks:
      - aiagent-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  whatsapp_auth:

networks:
  aiagent-network:
    driver: bridge