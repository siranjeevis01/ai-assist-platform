version: '3.8'

services:
  backend:
    build:
      context: ./AiAgentBackend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:5000
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION:-Server=mysql;Port=3306;Database=AiAgentDb;User=root;Password=yourpassword}
      - AI_AGENT_BASE_URL=${AI_AGENT_BASE_URL:-http://localhost:5000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Messaging__Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Messaging__WhatsApp__AccessToken=${WHATSAPP_ACCESS_TOKEN}
      - Messaging__WhatsApp__VerifyToken=${WHATSAPP_VERIFY_TOKEN}
      - Messaging__WhatsApp__PhoneNumberId=${WHATSAPP_PHONE_NUMBER_ID}
      - Messaging__WhatsApp__BusinessAccountId=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Trello__ApiKey=${TRELLO_API_KEY}
      - Trello__ApiSecret=${TRELLO_API_SECRET}
      - Trello__AccessToken=${TRELLO_ACCESS_TOKEN}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__Model=${OPENAI_MODEL:-gpt-4o-mini}
    env_file:
      - ./AiAgentBackend/.env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiagent-network

  frontend:
    build:
      context: ./ai-agent-frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aiagent-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-yourpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-AiAgentDb}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - aiagent-network

volumes:
  mysql_data:

networks:
  aiagent-network:
    driver: bridge
